<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenSafe - Offline Password Manager</title>

    <link rel="manifest" href="manifest.json">
    
<meta name="theme-color" content="#2c3e50">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --info: #2980b9;
            --bg: #ecf0f1;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
        }
        label { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; color: var(--secondary); }
        input[type="text"], input[type="password"], input[type="number"], input[type="file"] {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit;
        }
        input:disabled { background-color: #e9ecef; cursor: not-allowed; }
        
        .flex-row { display: flex; gap: 10px; align-items: flex-end; }
        .flex-item { flex: 1; }
        
        .checkbox-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .checkbox-label { cursor:pointer; display: flex; align-items: center; gap: 8px; font-weight: normal; font-size: 14px;}
        
        /* Buttons Style */
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button {
            flex: 1; padding: 10px; border: none; border-radius: 5px; min-width: 80px;
            color: white; font-size: 15px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-add { background-color: var(--accent); }
        .btn-search { background-color: var(--info); }
        .btn-update { background-color: var(--warning); }
        .btn-delete { background-color: var(--danger); }
        .btn-export { background-color: var(--primary); width: 100%; padding: 15px; font-size: 18px; margin-top: 10px;}
        button:hover { opacity: 0.9; }

        /* Log Container with word-break for long passwords */
        .log-container {
            background: #fdfefe; border: 1px solid #ccc; border-radius: 5px;
            padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 14px;
        }
        .log-entry { 
            margin-bottom: 8px; padding: 8px; border-radius: 4px; white-space: pre-wrap; 
            border-left: 4px solid transparent; background-color: #f8f9fa;
            word-break: break-all; /* اس لائن کی وجہ سے پاسورڈ باکس سے باہر نہیں جائے گا */
        }
        .log-default { color: #333; border-color: #bdc3c7; }
        .log-added { color: #155724; background-color: #d4edda; border-color: #28a745; }
        .log-updated { color: #856404; background-color: #fff3cd; border-color: #ffc107; }
        .log-deleted { color: #721c24; background-color: #f8d7da; border-color: #dc3545; font-weight: bold; }
        .log-info { color: #0c5460; background-color: #d1ecf1; border-color: #17a2b8; }
        .log-header { font-weight: bold; text-align: center; margin-bottom: 10px; color: #2c3e50; font-family: inherit;}
    </style>
</head>
<body>

<div class="container">
    <h2>GenSafe - Password</h2>

    <div class="section">
        <label>Upload Encrypted Database (JSON):</label>
        <span style="font-size:12px; color:#666; display:block; margin-bottom:5px;">(Leave empty if creating a new vault)</span>
        <input type="file" id="dbFile" accept=".json, application/json, text/plain, */*">
    </div>

    <div class="section flex-row">
        <div class="flex-item">
            <label>Master Password:</label>
            <input type="password" id="masterPass" placeholder="Enter Master Password">
        </div>
        <div class="flex-item">
            <label>Master PIN:</label>
            <input type="password" id="masterPin" placeholder="Enter Master PIN">
        </div>
    </div>

    <div class="section">
        <label>Account Name / Email:</label>
        <input type="text" id="accountName" placeholder="e.g., myemail@gmail.com">
        
        <div class="flex-row">
            <div class="flex-item" style="flex: 0.5;">
                <label>Length:</label>
                <input type="number" id="passLength" value="16" min="4" max="64">
            </div>
            <div class="flex-item" style="flex: 1.5;">
                <label>Special Characters:</label>
                <input type="text" id="allowedSymbols" value="!@#$%^&*" placeholder="e.g., @# (Leave empty for none)">
            </div>
        </div>

        <div class="checkbox-container">
            <label class="checkbox-label">
                <input type="checkbox" id="onlyNumbers" onchange="toggleInputs()"> 
                Only Numbers (Banking PIN)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="startWithLetter"> 
                Password must start with a Letter (A-Z)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="noConsecutive"> 
                No consecutive identical characters (e.g., AA or 88)
            </label>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-add" onclick="addAccount()">Add</button>
        <button class="btn-search" onclick="searchAccount()">Search</button>
        <button class="btn-update" onclick="updateAccount()">Update</button>
        <button class="btn-delete" onclick="deleteAccount()">Delete</button>
    </div>

    <label>Staging Area (Temporary Logs):</label>
    <div id="outputLog" class="log-container"></div>

    <button class="btn-export" onclick="exportDatabase()">Export Vault to JSON</button>
    <button style="background: #7f8c8d; width: 100%; margin-top:5px;" onclick="flushMemory()">Flush Memory</button>
</div>

<script>
    let currentDatabase = []; 
    let isFileLoaded = false;

    function toggleInputs() {
        let isNumbers = document.getElementById('onlyNumbers').checked;
        document.getElementById('allowedSymbols').disabled = isNumbers;
        document.getElementById('startWithLetter').disabled = isNumbers;
        if(isNumbers) document.getElementById('startWithLetter').checked = false;
    }

    document.getElementById('dbFile').addEventListener('change', async function(e) {
        let file = e.target.files[0];
        if (!file) return;
        let mPass = document.getElementById('masterPass').value;
        let mPin = document.getElementById('masterPin').value;
        if(!mPass || !mPin) { alert("Please enter Master Password and PIN to decrypt the file."); e.target.value = ""; return; }

        let reader = new FileReader();
        reader.onload = async function(e) {
            try {
                let parsed = JSON.parse(e.target.result);
                let key = await deriveAESKey(mPass, mPin);
                let decryptedStr = await decryptData(parsed.data, key);
                if (decryptedStr) {
                    currentDatabase = JSON.parse(decryptedStr);
                    isFileLoaded = true;
                    document.getElementById('outputLog').innerHTML = '';
                    logToUI(`✅ File loaded successfully. Total Accounts: ${currentDatabase.length}`, 'log-info');
                    
                    let allRecords = "<div class='log-header'>--- Current Accounts in Vault ---</div>";
                    for (let rule of currentDatabase) {
                        let hash = await generateHash(rule.account, mPass, mPin);
                        let finalPass = formatPassword(hash, rule);
                        allRecords += `🔹 ${rule.account}\n🔑 ${finalPass}\n\n`;
                    }
                    if(currentDatabase.length > 0) logToUI(allRecords, 'log-default');
                } else { alert("❌ Decryption failed! Incorrect Password/PIN."); e.target.value = ""; }
            } catch (err) { alert("❌ Invalid or corrupted file."); e.target.value = ""; }
        };
        reader.readAsText(file);
    });

    async function generateHash(account, pass, pin) {
        const data = new TextEncoder().encode(account + pass + pin);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function deriveAESKey(pass, pin) {
        const keyMaterial = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass + pin), { name: "PBKDF2" }, false, ["deriveKey"]);
        return await crypto.subtle.deriveKey({ name: "PBKDF2", salt: new TextEncoder().encode("SecureSalt_786"), iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    }

    async function encryptData(jsonData, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(jsonData));
        const combined = new Uint8Array(iv.length + encrypted.byteLength);
        combined.set(iv, 0); combined.set(new Uint8Array(encrypted), iv.length);
        return btoa(String.fromCharCode(...combined));
    }

    async function decryptData(encryptedBase64, key) {
        try {
            const combinedStr = atob(encryptedBase64);
            const combined = new Uint8Array(combinedStr.length);
            for (let i = 0; i < combinedStr.length; i++) combined[i] = combinedStr.charCodeAt(i);
            const iv = combined.slice(0, 12); const data = combined.slice(12);
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
            return new TextDecoder().decode(decrypted);
        } catch (e) { return null; }
    }

    function formatPassword(baseHash, rules) {
        let { length, symbols, onlyNumbers, startLetter, noConsecutive } = rules;
        let lowerChars = "abcdefghijklmnopqrstuvwxyz";
        let upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let numChars = "0123456789";
        let chars = onlyNumbers ? numChars : lowerChars + upperChars + numChars + (symbols || "");
        
        let passArray = [];
        for (let i = 0; i < length; i++) {
            let hex = baseHash.substring(i * 2, (i * 2) + 2);
            passArray.push(chars[parseInt(hex, 16) % chars.length]);
        }
        
        if (!onlyNumbers && length >= 16 && symbols) {
            let upCount = passArray.filter(c => upperChars.includes(c)).length;
            let numCount = passArray.filter(c => numChars.includes(c)).length;
            let symCount = passArray.filter(c => symbols.includes(c)).length;
            let hashOff = 40; 
            function enforceMin(cur, minReq, pool) {
                while (cur < minReq) {
                    let lows = passArray.map((c, i) => lowerChars.includes(c) ? i : -1).filter(i => i !== -1);
                    if (lows.length > 0) {
                        let posHex = baseHash.substring(hashOff, hashOff + 2);
                        let charHex = baseHash.substring(hashOff + 2, hashOff + 4);
                        hashOff = (hashOff + 4) % 60;
                        passArray[lows[parseInt(posHex, 16) % lows.length]] = pool[parseInt(charHex, 16) % pool.length];
                        cur++;
                    } else break;
                }
            }
            enforceMin(upCount, 2, upperChars); enforceMin(numCount, 2, numChars); enforceMin(symCount, 2, symbols);
        }

        if (startLetter && !onlyNumbers) {
            let allLets = lowerChars + upperChars;
            if (!allLets.includes(passArray[0])) {
                let lIdx = passArray.findIndex(c => allLets.includes(c));
                if (lIdx > 0) { 
                    let tmp = passArray[0]; passArray[0] = passArray[lIdx]; passArray[lIdx] = tmp;
                } else passArray[0] = 'A'; 
            }
        }

        if (noConsecutive) {
            for (let i = 1; i < passArray.length; i++) {
                if (passArray[i] === passArray[i - 1]) {
                    let swapIdx = -1;
                    for (let j = i + 1; j < passArray.length; j++) {
                        if (passArray[j] !== passArray[i - 1]) { swapIdx = j; break; }
                    }
                    if (swapIdx !== -1) { 
                        let tmp = passArray[i]; passArray[i] = passArray[swapIdx]; passArray[swapIdx] = tmp;
                    } else { 
                        let avail = chars.split('').filter(c => c !== passArray[i-1]).join('');
                        let hex = baseHash.substring((i*2)%64, ((i*2)+2)%64);
                        if(avail) passArray[i] = avail[parseInt(hex, 16) % avail.length];
                    }
                }
            }
        }
        return passArray.join('');
    }

    function getInputs() {
        return {
            account: document.getElementById('accountName').value.trim(),
            pass: document.getElementById('masterPass').value,
            pin: document.getElementById('masterPin').value,
            length: parseInt(document.getElementById('passLength').value),
            symbols: document.getElementById('allowedSymbols').value,
            onlyNumbers: document.getElementById('onlyNumbers').checked,
            startLetter: document.getElementById('startWithLetter').checked,
            noConsecutive: document.getElementById('noConsecutive').checked
        };
    }

    async function addAccount() {
        let rule = getInputs();
        if (!rule.account || !rule.pass || !rule.pin) return alert("Please fill in Account Name, Master Password, and PIN.");
        if (currentDatabase.find(i => i.account.toLowerCase() === rule.account.toLowerCase())) return alert("Account already exists! Use the Update button.");

        currentDatabase.push(rule);
        let hash = await generateHash(rule.account, rule.pass, rule.pin);
        logToUI(`➕ Added: ${rule.account}\n🔑 Password: ${formatPassword(hash, rule)}`, 'log-added');
    }

    async function searchAccount() {
        let {account, pass, pin} = getInputs();
        if (!account || !pass || !pin) return alert("Please fill in Account Name, Master Password, and PIN.");
        let rule = currentDatabase.find(i => i.account.toLowerCase() === account.toLowerCase());
        if (!rule) return alert("❌ Account not found in database.");

        document.getElementById('passLength').value = rule.length;
        document.getElementById('allowedSymbols').value = rule.symbols || "";
        document.getElementById('onlyNumbers').checked = rule.onlyNumbers || false;
        document.getElementById('startWithLetter').checked = rule.startLetter || false;
        document.getElementById('noConsecutive').checked = rule.noConsecutive || false;
        toggleInputs();

        let hash = await generateHash(rule.account, pass, pin);
        logToUI(`🔍 Found: ${rule.account}\n🔑 Password: ${formatPassword(hash, rule)}`, 'log-info');
    }

    async function updateAccount() {
        let rule = getInputs();
        if (!rule.account || !rule.pass || !rule.pin) return alert("Please fill in Account Name, Master Password, and PIN.");
        let index = currentDatabase.findIndex(i => i.account.toLowerCase() === rule.account.toLowerCase());
        if (index === -1) return alert("❌ Account not found.");
        if (!confirm("Are you sure you want to update the rules for this account? This will permanently change its generated password.")) return;

        currentDatabase[index] = rule;
        let hash = await generateHash(rule.account, rule.pass, rule.pin);
        logToUI(`🔄 Updated: ${rule.account}\n🔑 New Password: ${formatPassword(hash, rule)}`, 'log-updated');
    }

    function deleteAccount() {
        let {account} = getInputs();
        if (!account) return alert("Please enter the Account Name to delete.");
        let index = currentDatabase.findIndex(i => i.account.toLowerCase() === account.toLowerCase());
        if (index === -1) return alert("❌ Account not found.");
        if (!confirm(`WARNING!\nAre you sure you want to permanently delete '${account}' from the database?`)) return;

        currentDatabase.splice(index, 1);
        logToUI(`🗑️ Deleted: ${account}`, 'log-deleted');
        document.getElementById('accountName').value = '';
    }

    async function exportDatabase() {
        let {pass, pin} = getInputs();
        if (!pass || !pin) return alert("Master Password and PIN are required for export.");
        if (currentDatabase.length === 0) return alert("Database is empty. Nothing to export.");

        let key = await deriveAESKey(pass, pin);
        let encStr = await encryptData(JSON.stringify(currentDatabase), key);
        
        let a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({data: encStr}, null, 2));
        a.download = "my_ultimate_vault.json";
        document.body.appendChild(a); a.click(); a.remove();
        logToUI(`💾 Export Complete! Secured ${currentDatabase.length} account(s) in JSON file.`, 'log-info');
    }

    function logToUI(text, className) {
        let box = document.getElementById('outputLog');
        let div = document.createElement('div');
        div.className = `log-entry ${className}`;
        div.innerHTML = text.replace(/\n/g, "<br>");
        box.insertBefore(div, box.firstChild);
    }

    function flushMemory() {
        currentDatabase = []; isFileLoaded = false;
        document.getElementById('accountName').value = '';
        document.getElementById('masterPass').value = '';
        document.getElementById('masterPin').value = '';
        document.getElementById('dbFile').value = '';
        document.getElementById('outputLog').innerHTML = '';
        alert("Memory has been completely flushed.");
    }


//ایپ کے لیے اضافہ
// سروس ورکر کو رجسٹر کرنا
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker Registered!'))
            .catch(err => console.log('Service Worker Failed!', err));
    });
}
</script>
</body>
</html>
